<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 12px;
        min-width: 220px;
      }
      select {
        width: 100%;
        margin-bottom: 8px;
        padding: 6px;
        font-size: 13px;
      }
      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        cursor: pointer;
        background: #f3f4f6;
        border: 1px solid #d1d5db;
        border-radius: 6px;
      }
      button:hover {
        background: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <select id="structure">
      <option value="flat">Flat structure</option>
      <option value="structured">Inferred structure</option>
    </select>
    <button id="export">Export current chat</button>
    <script src="popup.js"></script>
  </body>
</html>
